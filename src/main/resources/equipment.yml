# ============================================================================
#  MyPetAddon - 装備設定
#  装備スロット、解放条件、デフォルト装備効果を定義します。
#  変更後は /mypetaddon reload で反映してください。
# ============================================================================

equipment:
  # 利用可能な装備スロット
  slots:
    - "HEAD"
    - "CHEST"
    - "ACCESSORY"

  # ステータスのみ適用 (true = 見た目は変更しない)
  stat-only: true

  # --- スロット解放条件 (親密度レベル) ---
  # 親密度レベルが条件未満の場合、そのスロットはロックされる
  slot-unlock:
    HEAD: 1        # 初対面から使用可能
    CHEST: 3       # 仲間 (Lv.3) で解放
    ACCESSORY: 4   # 信頼 (Lv.4) で解放

  # --- デフォルト装備効果 ---
  # アイテムにPDCタグがない場合、素材名から自動でステータスボーナスを付与
  # 各スロットごとにアイテム素材 → ステータスボーナスを定義
  default-effects:
    HEAD:
      LEATHER_HELMET:
        Life: 2.0
      CHAINMAIL_HELMET:
        Life: 4.0
      IRON_HELMET:
        Life: 6.0
      DIAMOND_HELMET:
        Life: 10.0
      NETHERITE_HELMET:
        Life: 15.0
      GOLDEN_HELMET:
        Life: 5.0
        Speed: 0.5
      TURTLE_HELMET:
        Life: 10.0
    CHEST:
      LEATHER_CHESTPLATE:
        Life: 3.0
      CHAINMAIL_CHESTPLATE:
        Life: 5.0
      IRON_CHESTPLATE:
        Life: 8.0
      DIAMOND_CHESTPLATE:
        Life: 14.0
        Damage: 1.0
      NETHERITE_CHESTPLATE:
        Life: 20.0
        Damage: 2.0
      GOLDEN_CHESTPLATE:
        Life: 7.0
        Speed: 1.0
      ELYTRA:
        Speed: 3.0
    ACCESSORY:
      # --- SSR級チャーム ---
      NETHER_STAR:
        Life: 5.0
        Damage: 5.0
        Speed: 1.0
      ENCHANTED_GOLDEN_APPLE:
