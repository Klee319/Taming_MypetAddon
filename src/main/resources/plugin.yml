name: MyPetAddon
version: ${version}
main: com.mypetaddon.MyPetAddonPlugin
api-version: "1.21"
description: "MyPet extension with rarity, personality, bond, evolution, skills, equipment, and encyclopedia"
depend:
  - MyPet
softdepend:
  - LevelledMobs
  - MythicMobs
commands:
  pettame:
    description: "Name a pending tamed monster"
    usage: "/pettame <name>"
    aliases: [petclaim]
  petstatus:
    description: "Show pet status"
    usage: "/petstatus"
  petadmin:
    description: "Admin commands"
    usage: "/petadmin <subcommand>"
  petevolve:
    description: "Evolve your pet"
    usage: "/petevolve"
  petequip:
    description: "Open pet equipment GUI"
    usage: "/petequip"
  petdex:
    description: "Open pet encyclopedia"
    usage: "/petdex"
  petrelease:
    description: "Release your pet (GUI confirmation)"
    usage: "/petrelease"
    aliases: [mprelease, petfree]
  petst:
    description: "View pet skilltree skills"
    usage: "/petst"
    aliases: [mpskill]
permissions:
  mypetaddon.*:
    description: "All MyPetAddon permissions"
    default: op
    children:
      mypetaddon.tame: true
      mypetaddon.status: true
      mypetaddon.equip: true
      mypetaddon.encyclopedia: true
      mypetaddon.evolve: true
      mypetaddon.admin: true
      mypetaddon.release: true
      mypetaddon.skill: true
  mypetaddon.tame:
    description: "Allows taming pets"
    default: true
  mypetaddon.status:
    description: "Allows viewing pet status"
    default: true
  mypetaddon.equip:
    description: "Allows equipping pets"
    default: true
  mypetaddon.encyclopedia:
    description: "Allows viewing pet encyclopedia"
    default: true
  mypetaddon.evolve:
    description: "Allows evolving pets"
    default: true
  mypetaddon.release:
    description: "Allows releasing pets"
    default: true
  mypetaddon.skill:
    description: "Allows viewing pet skilltree"
    default: true
  mypetaddon.admin:
    description: "Admin commands"
    default: op
