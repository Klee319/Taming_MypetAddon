# ============================================================================
#  MyPetAddon - メイン設定ファイル
#  プラグインバージョン: ${version}
#
#  このファイルではプラグインの全機能を細かく設定できます。
#  変更後は /mypetaddon reload で反映してください。
# ============================================================================

# --------------------------------------------------------------------------
# 1. 全般設定
# --------------------------------------------------------------------------
general:
  # デバッグモード (true にすると詳細ログがコンソールに出力されます)
  debug: false
  # ロケール (メッセージ言語)
  locale: "ja_JP"

# --------------------------------------------------------------------------
# 2. テイミング設定
# --------------------------------------------------------------------------
taming:
  # --- 動物テイミング ---
  animals:
    # テイミングに使用するアイテムリスト（複数指定可）
    # item: マテリアル名（例: "GOLDEN_APPLE"）または "base64:<エンコード済みItemStack>"
    # success-rate: 成功率（0.0〜1.0、1.0 = 100%）
    # consume: テイミング試行時にアイテムを消費するか
    items:
      - item: "GOLDEN_APPLE"
        success-rate: 1.0
        consume: true
      - item: "ENCHANTED_GOLDEN_APPLE"
        success-rate: 1.0
        consume: true
    # テイミング成功時のパーティクル
    particle: "HEART"
    # パーティクルの数
    particle-count: 10
    # テイミング成功時のサウンド
    sound: "ENTITY_PLAYER_LEVELUP"

  # --- モンスターテイミング ---
  monsters:
    # テイミングに使用するアイテムリスト（複数指定可）
    # item: マテリアル名（例: "NETHER_STAR"）または "base64:<エンコード済みItemStack>"
    # success-rate: 成功率（0.0〜1.0、1.0 = 100%）
    # consume: テイミング試行時にアイテムを消費するか
    items:
      - item: "NETHER_STAR"
        success-rate: 1.0
        consume: true
    # 名前入力の待機時間 (秒)
    naming-timeout: 30
    # 名前入力に使用するコマンド
    naming-command: "/petname"
    # プレイヤーごとにテイミング対象を1体に制限するか
    single-target-per-player: true

  # --- テイミング除外リスト ---
  # ここに記載したモブタイプはテイミング不可になります
  excluded-types:
    - "ENDER_DRAGON"
    - "ELDER_GUARDIAN"
    - "IRON_GOLEM"
    - "SNOW_GOLEM"
    - "VILLAGER"
    - "WANDERING_TRADER"
    - "BAT"

  # --- MythicMobs 除外設定 ---
  mythicmobs-exclusion:
    # MythicMobs のモブをテイミング対象から除外するか
    enabled: true
    # 除外するMythicMobsの内部名リスト (空の場合は全て除外)
    excluded-ids: []

# --------------------------------------------------------------------------
# 3. レアリティ設定
# --------------------------------------------------------------------------
rarity:
  # --- レアリティティア定義 ---
  tiers:
    COMMON:
      color: "§f"
      stat-multiplier: 1.0
      skill-slots: 1
      particle: ""
      particle-interval: 0
      awakening: false
    UNCOMMON:
      color: "§a"
      stat-multiplier: 1.15
      skill-slots: 2
      particle: ""
      particle-interval: 0
      awakening: false
    RARE:
      color: "§9"
      stat-multiplier: 1.35
      skill-slots: 3
      particle: "HAPPY_VILLAGER"
      particle-interval: 40
      awakening: false
    EPIC:
      color: "§5"
      stat-multiplier: 1.6
      skill-slots: 4
      particle: "WITCH"
      particle-interval: 30
      awakening: true
    LEGENDARY:
      color: "§6"
      stat-multiplier: 2.0
      skill-slots: 5
      particle: "TOTEM_OF_UNDYING"
      particle-interval: 20
      awakening: true
    MYTHIC:
      color: "§d"
      stat-multiplier: 2.5
      skill-slots: 6
      particle: "DRAGON_BREATH"
      particle-interval: 10
      awakening: true

  # --- レベル帯ごとのレアリティ重み ---
  # LevelledMobs のレベルに基づいてレアリティが決定されます
  # 各レアリティの重みが高いほど選ばれやすくなります
  level-ranges:
    "1-10":
      COMMON: 60
      UNCOMMON: 25
      RARE: 10
      EPIC: 4
      LEGENDARY: 1
      MYTHIC: 0
    "11-25":
      COMMON: 35
      UNCOMMON: 30
      RARE: 20
      EPIC: 10
      LEGENDARY: 4
      MYTHIC: 1
    "26-50":
      COMMON: 15
      UNCOMMON: 25
      RARE: 25
      EPIC: 20
      LEGENDARY: 10
      MYTHIC: 5
    "51+":
      COMMON: 5
      UNCOMMON: 10
      RARE: 20
      EPIC: 30
      LEGENDARY: 20
      MYTHIC: 15

  # LevelledMobs が導入されていない場合のフォールバック重み
  no-levelledmobs-fallback:
    COMMON: 40
    UNCOMMON: 25
    RARE: 18
    EPIC: 10
    LEGENDARY: 5
    MYTHIC: 2

  # --- 環境ボーナス ---
  # 特定の環境条件でレアリティの出現率にボーナスが付きます
  # 値はレアリティ判定時に上位ティアの重みに加算されるポイント
  environment-bonuses:
    # 満月の夜
    full-moon: 5
    # 雷雨
    thunderstorm: 8
    # ディープダークバイオーム
    deep-dark-biome: 12
    # エンドディメンション
    end-dimension: 10
    # ネザー要塞
    nether-fortress: 7
    # ボーナスの累積上限
    max-bonus-cap: 20

# --------------------------------------------------------------------------
# 4. 性格設定
# --------------------------------------------------------------------------
personalities:
  BRAVE:
    display-name: "勇敢"
    description: "戦闘で恐れを知らず、攻撃力が上昇する"
    modifiers:
      damage: 1.10
      health: 0.95
    custom-effects:
      aggroRange: 1.2
    weight: 20

  STURDY:
    display-name: "頑強"
    description: "タフで打たれ強く、ダメージを吸収する"
    modifiers:
      health: 1.15
      damage: 0.95
    custom-effects:
      knockbackResist: 1.3
    weight: 20

  AGILE:
    display-name: "俊敏"
    description: "素早い身のこなしで攻撃を回避する"
    modifiers:
      speed: 1.15
      health: 0.90
    custom-effects:
      dodgeChance: 0.08
    weight: 18

  LOYAL:
    display-name: "忠誠"
    description: "深い絆を持ち、信頼を早く獲得する"
    modifiers:
      health: 1.05
    custom-effects:
      bondExpMultiplier: 1.25
    weight: 18

  FIERCE:
    display-name: "獰猛"
    description: "壊滅的なクリティカルストライクを放つ"
    modifiers:
      damage: 1.20
      health: 0.90
      speed: 0.95
    custom-effects:
      critChance: 0.10
    weight: 12

  CAUTIOUS:
    display-name: "慎重"
    description: "注意深く、不意を突かれることが少ない"
    modifiers:
      health: 1.10
      speed: 1.05
      damage: 0.90
    custom-effects:
      threatDetectRange: 1.5
    weight: 12

  LUCKY:
    display-name: "幸運"
    description: "幸運に恵まれた仲間"
    modifiers: {}
    custom-effects:
      lootBonusChance: 0.15
      rareDropMultiplier: 1.3
    weight: 5

  GENIUS:
    display-name: "天才"
    description: "明晰な頭脳でスキルを素早く習得する"
    modifiers:
      damage: 1.05
    custom-effects:
      skillExpMultiplier: 1.30
      skillCooldownReduction: 0.10
    weight: 5

# --------------------------------------------------------------------------
# 5. 絆 (Bond) 設定
# --------------------------------------------------------------------------
bond:
  # --- 絆レベル定義 ---
  levels:
    1:
      min: 0
      max: 99
      bonus: "なし"
    2:
      min: 100
      max: 299
      bonus: "ステータス +5%"
    3:
      min: 300
      max: 599
      bonus: "ステータス +10%, スキルクールダウン -10%"
    4:
      min: 600
      max: 999
      bonus: "ステータス +15%, スキルクールダウン -15%, 経験値ボーナス +10%"
    5:
      min: 1000
      max: 9999
      bonus: "ステータス +25%, スキルクールダウン -20%, 経験値ボーナス +20%, 特殊スキル解放"

  # --- 絆経験値の獲得量 ---
  gain:
    # 戦闘でモブを倒した時
    combat-kill: 5
    # ペットにエサを与えた時
    feeding: 3
    # ログイン時にペットを召喚した時
    login-summon: 2
    # ペットに騎乗中 (1分あたり)
    riding-per-minute: 1

  # --- 絆経験値の減少 ---
  loss:
    # 日次の自然減少量
    daily-decay: 2
    # ペットが死亡した時の減少量
    pet-death: 20
    # オフライン中の最大累積減少量
    max-offline-decay: 50

  # --- デバウンス設定 ---
  # 短時間に連続して獲得されることを防ぐクールダウン (ミリ秒)
  debounce:
    combat-kill-cooldown: 5000
    feeding-cooldown: 10000

