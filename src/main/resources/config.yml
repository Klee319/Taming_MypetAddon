# --------------------------------------------------------------------------
# 7. リロールアイテム設定
# --------------------------------------------------------------------------
reroll-items:
  # リロールアイテムリスト（複数指定可）
  # item: マテリアル名または "base64:<エンコード済みItemStack>"
  # type: アイテムの用途（reroll = レアリティ再抽選, upgrade = レアリティアップグレード, skilltree = スキルツリー再抽選, stat-add = 基礎ステータス+1）
  # success-rate: 成功率（0.0〜1.0、1.0 = 100%）
  # consume: 使用時にアイテムを消費するか
  items:
    - item: "AMETHYST_SHARD"
      type: "reroll"
      success-rate: 1.0
      consume: true
    - item: "NETHER_STAR"
      type: "upgrade"
      success-rate: 0.5
      consume: true
    - item: "ECHO_SHARD"
      type: "skilltree"
      success-rate: 1.0
      consume: true

# --------------------------------------------------------------------------
# 8. 進化設定
# --------------------------------------------------------------------------
evolutions:
  ZOMBIE:
    target: "HUSK"
    conditions:
      # 進化に必要な最低レベル
      min-level: 20
      # 進化に必要な最低絆レベル
      min-bond-level: 3
      # 必要なバイオーム (空の場合は制限なし)
      required-biome: "DESERT"
      # 進化に必要な消費アイテム
      required-item: "GOLDEN_APPLE"
      # アイテムの必要個数
      required-item-amount: 1
    stat-bonus:
      Life: 1.15
      Damage: 1.10

  HUSK:
    target: "DROWNED"
    conditions:
      min-level: 35
      min-bond-level: 4
      required-biome: "OCEAN"
      required-item: "HEART_OF_THE_SEA"
      required-item-amount: 1
    stat-bonus:
      Life: 1.20
      Damage: 1.15

  SKELETON:
    target: "WITHER_SKELETON"
    conditions:
      min-level: 30
      min-bond-level: 4
      required-biome: "NETHER_WASTES"
      required-item: "WITHER_SKELETON_SKULL"
      required-item-amount: 1
    stat-bonus:
      Life: 1.25
      Damage: 1.20

  SPIDER:
    target: "CAVE_SPIDER"
    conditions:
      min-level: 15
      min-bond-level: 2
      required-biome: ""
      required-item: "FERMENTED_SPIDER_EYE"
      required-item-amount: 3
    stat-bonus:
      Life: 1.05
      Damage: 1.25

# --------------------------------------------------------------------------
# 9. スキルツリー自動割り当て設定
# --------------------------------------------------------------------------
# テイム時にスキルツリーを自動的に割り当てます。
# 優先度: per-rarity > per-mob > default > MyPet組み込みランダム
# skilltree: MyPetに登録されているスキルツリー名（skilltrees/*.st.json の名前）
# weight: 選出重み（大きいほど選ばれやすい）
#
# MyPet標準のスキルツリー: Combat, Farm, PvP, Ride, Utility
# カスタムスキルツリーは plugins/MyPet/skilltrees/ に追加してください
skilltree-assignment:
  # --- デフォルト（特定の指定がない場合） ---
  default:
    - skilltree: "Combat"
      weight: 30
    - skilltree: "Utility"
      weight: 25
    - skilltree: "Farm"
      weight: 20
    - skilltree: "Ride"
      weight: 15
    - skilltree: "PvP"
      weight: 10

  # --- レアリティ別オーバーライド（上位レアリティに強力なツリーを） ---
  # per-rarity:
  #   MYTHIC:
  #     - skilltree: "Combat"
  #       weight: 50
  #     - skilltree: "PvP"
  #       weight: 50
  #   LEGENDARY:
  #     - skilltree: "Combat"
  #       weight: 40
  #     - skilltree: "PvP"
  #       weight: 30
  #     - skilltree: "Utility"
  #       weight: 30

  # --- モブタイプ別オーバーライド ---
  # per-mob:
  #   WOLF:
  #     - skilltree: "Combat"
  #       weight: 60
  #     - skilltree: "Ride"
  #       weight: 40
  #   HORSE:
  #     - skilltree: "Ride"
  #       weight: 80
  #     - skilltree: "Farm"
  #       weight: 20

# --------------------------------------------------------------------------
# 10. 装備設定
# --------------------------------------------------------------------------
equipment:
  # 利用可能な装備スロット
  slots:
    - "HEAD"
    - "CHEST"
    - "LEGS"
    - "FEET"
    - "WEAPON"
    - "ACCESSORY"

  # ステータスのみ適用 (true = 見た目は変更しない)
  stat-only: true

# --------------------------------------------------------------------------
# 11. 図鑑 (Encyclopedia) 設定
# --------------------------------------------------------------------------
encyclopedia:
  gui:
    # GUI タイトル
    title: "§8§lペット図鑑"
    # GUI の行数 (1-6)
    rows: 6
    # ソート方法 (NAME, RARITY, BOND_LEVEL, TAME_DATE)
    sort: "NAME"

  # --- コンプリート報酬 ---
  completion-rewards:
    25:
      # 25% 達成時の報酬コマンド (%player% はプレイヤー名に置換)
      commands:
        - "give %player% diamond 5"
      message: "§a図鑑25%%達成！ダイヤモンド5個を獲得しました！"
    50:
      commands:
        - "give %player% emerald 10"
        - "give %player% golden_apple 3"
      message: "§a図鑑50%%達成！エメラルド10個と金リンゴ3個を獲得しました！"
    75:
      commands:
        - "give %player% nether_star 1"
        - "give %player% enchanted_golden_apple 1"
      message: "§6図鑑75%%達成！ネザースターとエンチャント金リンゴを獲得しました！"
    100:
      commands:
        - "give %player% nether_star 3"
        - "give %player% elytra 1"
        - "give %player% totem_of_undying 1"
      message: "§d§l図鑑100%%達成！伝説の報酬を獲得しました！"

# --------------------------------------------------------------------------
# 12. サウンド設定
# --------------------------------------------------------------------------
sounds:
  # テイミング成功
  tame-success:
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.2
  # モンスターテイミング準備完了
  tame-monster-ready:
    sound: "BLOCK_NOTE_BLOCK_CHIME"
    volume: 1.0
    pitch: 1.5
  # 進化成功
  evolution-success:
    sound: "UI_TOAST_CHALLENGE_COMPLETE"
    volume: 1.0
    pitch: 1.0
  # レアリティアップグレード
  rarity-upgrade:
    sound: "ENTITY_ENDER_DRAGON_GROWL"
    volume: 1.0
    pitch: 1.5

# --------------------------------------------------------------------------
# 13. LevelledMobs 連携設定
# --------------------------------------------------------------------------
levelledmobs:
  # LevelledMobs が使用する PersistentDataContainer のキー
  pdc-key: "level"

# --------------------------------------------------------------------------
# 14. メッセージ設定
# --------------------------------------------------------------------------
messages:
  # --- プレフィックス ---
  prefix: "§8[§bMyPet§eAddon§8]§r "

  # --- テイミング ---
  tame-success: "§a%pet_name% §7をテイミングしました！ (レアリティ: %rarity%, 性格: %personality%)"
  tame-fail: "§cテイミングに失敗しました..."
  tame-fail-rate: "§cテイミングに失敗しました... (成功率: §f%rate%%§c)"
  tame-excluded: "§cこのモブはテイミングできません。"
  tame-monster-start: "§eモンスターテイミングを開始しました。§f%timeout%秒§e以内にチャットで名前を入力してください。"
  tame-monster-naming: "§aペットの名前を入力してください (§f%command%§a を使用)"
  tame-monster-timeout: "§c名前入力の時間切れです。テイミングがキャンセルされました。"
  tame-already-targeting: "§c既に別のモブをテイミング中です。"
  tame-mythicmob-blocked: "§cこのMythicMobはテイミングできません。"

  # --- レアリティ ---
  rarity-display: "§7レアリティ: %rarity_colored%"
  rarity-upgrade-success: "§6レアリティが §r%old_rarity% §6から §r%new_rarity% §6にアップグレードしました！"
  rarity-upgrade-fail: "§cレアリティのアップグレードに失敗しました。"
  rarity-already-max: "§cこのペットは既に最高レアリティです。"
  rarity-reroll-success: "§eレアリティを再抽選しました！ 結果: %rarity_colored%"

  # --- 性格 ---
  personality-display: "§7性格: §f%personality_name% §8- §7%personality_desc%"

  # --- 絆 ---
  bond-level-up: "§d%pet_name% §7との絆がレベル §f%bond_level% §7に上がりました！ ボーナス: §f%bond_bonus%"
  bond-display: "§7絆レベル: §f%bond_level% §8(§7%bond_exp%/%bond_next%§8)"
  bond-decay-warning: "§e長い間ペットと触れ合っていません。絆が少し下がりました。"
  bond-pet-death: "§c%pet_name% が倒されました。絆が §f%bond_loss% §c減少しました。"

  # --- 進化 ---
