# ============================================================================
#  MyPetAddon - メイン設定ファイル
#  プラグインバージョン: ${version}
#
#  このファイルではプラグインの全般設定を管理します。
#  各機能の詳細設定は個別ファイルに分割されています:
#    rarity.yml, personality.yml, bond.yml, stats.yml,
#    evolution.yml, skilltree.yml, equipment.yml, messages.yml
#  変更後は /mypetaddon reload で反映してください。
# ============================================================================

# --------------------------------------------------------------------------
# 1. 全般設定
# --------------------------------------------------------------------------
general:
  # デバッグモード (true にすると詳細ログがコンソールに出力されます)
  debug: false
  # ロケール (メッセージ言語)
  locale: "ja_JP"

# --------------------------------------------------------------------------
# 2. テイミング設定
# --------------------------------------------------------------------------
taming:
  # --- 動物テイミング ---
  animals:
    # テイミングに使用するアイテムリスト（複数指定可）
    # item: マテリアル名（例: "GOLDEN_APPLE"）または "base64:<エンコード済みItemStack>"
    # success-rate: 成功率（0.0〜1.0、1.0 = 100%）
    # consume: テイミング試行時にアイテムを消費するか
    items:
      - item: "GOLDEN_APPLE"
        success-rate: 0.05
        consume: true
      - item: "ENCHANTED_GOLDEN_APPLE"
        success-rate: 1.0
        consume: true
    # テイミング成功時のパーティクル
    particle: "HEART"
    # パーティクルの数
    particle-count: 10
    # テイミング成功時のサウンド
    sound: "ENTITY_PLAYER_LEVELUP"

  # --- モンスターテイミング ---
  monsters:
    # テイミングに使用するアイテムリスト（複数指定可）
    # item: マテリアル名（例: "NETHER_STAR"）または "base64:<エンコード済みItemStack>"
    # success-rate: 成功率（0.0〜1.0、1.0 = 100%）
    # consume: テイミング試行時にアイテムを消費するか
    # ※ 動物用アイテムと重複させないこと（動物ルートが優先されるため）
    items:
      - item: "DIAMOND"
        success-rate: 0.05
        consume: true
      - item: "ENCHANTED_GOLDEN_APPLE"
        success-rate: 1.0
        consume: true
    # 名前入力の待機時間 (秒)
    naming-timeout: 60
    # 名前入力に使用するコマンド
    naming-command: "/pettame"
    # プレイヤーごとにテイミング対象を1体に制限するか
    single-target-per-player: true

  # --- テイミング試行回数制限 ---
  # 1体のモブに対してテイムアイテムを使える最大回数（0 = 無制限）
  # 例: 10 の場合、10回失敗したらそのモブにはテイムアイテムを使えなくなる
  max-attempts-per-mob: 5

  # --- テイミング除外リスト ---
  # ここに記載したモブタイプはテイミング不可になります
  # ※シュルカーはデフォルト不可
  excluded-types:
    - "ENDER_DRAGON"
    - "VILLAGER"
    - "WANDERING_TRADER"
    - "SHULKER"

  # --- ペットスケール(サイズ)オーバーライド ---
  # テイム後のペットの大きさを変更する設定
  # モブタイプ名: スケール値（1.0 = 通常サイズ、0.7 = 70%サイズ）
  # Attribute.SCALE を使用（Paper 1.20.5+）
  scale-overrides:
    WITHER: 0.7
    ELDER_GUARDIAN: 0.7
    GHAST: 0.5

  # --- MythicMobs 除外設定 ---
  mythicmobs-exclusion:
    # MythicMobs のモブをテイミング対象から除外するか
    enabled: true
    # 除外するMythicMobsの内部名リスト (空の場合は全て除外)
    excluded-ids: []

# --------------------------------------------------------------------------
# 6.5. レベルボーナス設定
# --------------------------------------------------------------------------
# MyPetのレベルが一定以上になると、全ステータスにボーナスが付きます。
# 例: start-level: 20, per-level-bonus: 0.005 の場合
#   LV21 = +0.5%, LV30 = +5%, LV50 = +15%, LV70 = +25%(上限)
level-bonuses:
  enabled: true
  # MyPetの経験値獲得倍率（1.0 = 通常、0.7 = 30%減少）
  # 値を下げるとレベル上げが難しくなります
  exp-multiplier: 0.7
  # ボーナスが発生し始めるレベル
  start-level: 20
  # レベルごとのボーナス倍率（0.00625 = +0.625%/Lv）
  # LV100で最大+50%（1.5倍）に到達する設計
  per-level-bonus: 0.00625
  # ボーナスの上限（0.50 = +50% = 最終的に1.5倍）
  max-bonus: 0.50
  # 経験値減少を防止する（true = ペット死亡やバグによる経験値ロスを完全にブロック）
  # サーバー出入りでレベルが下がる問題が発生する場合はtrueにしてください
  prevent-exp-loss: true

# --------------------------------------------------------------------------
# 7. リロールアイテム設定
# --------------------------------------------------------------------------
reroll-items:
  # リロールアイテムリスト（複数指定可）
  # item: マテリアル名または "base64:<エンコード済みItemStack>"
  # type: アイテムの用途（reroll = 基礎ステータス再抽選, upgrade = レアリティアップグレード, skilltree = スキルツリー再抽選, stat-add = 基礎ステータス+1）
  # success-rate: 成功率（0.0〜1.0、1.0 = 100%）
  # consume: 使用時にアイテムを消費するか
  items:
    - item: "REDSTONE_BLOCK"
      type: "reroll"
      success-rate: 0.05
      consume: true
    - item: "NETHER_STAR"
      type: "stat-add"
      success-rate: 1.0
      consume: true
    - item: "COPPER_BLOCK"
      type: "skilltree"
      success-rate: 0.01
      consume: true

# --------------------------------------------------------------------------
# 13. LevelledMobs 連携設定
# --------------------------------------------------------------------------
levelledmobs:
  # LevelledMobs が使用する PersistentDataContainer のキー
  pdc-key: "level"
