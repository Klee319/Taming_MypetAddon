# ============================================================================
#  MyPetAddon - 進化設定
#  ペットの進化先（分岐進化対応）、進化条件、ステータスボーナスを定義します。
#  変更後は /mypetaddon reload で反映してください。
# ============================================================================
# 各モブタイプに branches で複数の進化先を定義可能。
# fixed-skilltree: 進化時に固定で割り当てるスキルツリー名
#   (plugins/MyPet/skilltrees/ にある .st.json のファイル名)
#   空欄の場合は現在のスキルツリーを引き継ぎます。
# conditions: 進化条件（すべて満たす必要あり）
# stat-bonus: 進化時の基礎ステータス倍率ボーナス（1.15 = +15%）
evolutions:

  # ─── ゾンビ → ハスク / ドラウンド / 村人ゾンビ ───
  ZOMBIE:
    branches:
      husk:
        display-name: "§eハスク"
        target: "HUSK"
        fixed-skilltree: "DesertWrath"
        conditions:
          min-level: 20
          min-bond-level: 3
          required-biome: "DESERT"
          required-item: "GOLDEN_APPLE"
          required-item-amount: 1
        stat-bonus:
          Life: 1.15
          Damage: 1.10
      drowned:
        display-name: "§bドラウンド"
        target: "DROWNED"
        fixed-skilltree: "TidalDread"
        conditions:
