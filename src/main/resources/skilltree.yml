# ============================================================================
#  MyPetAddon - スキルツリー自動割り当て設定
#  テイム時のスキルツリー自動割り当てルールを定義します。
#  優先度: per-rarity > per-mob > default > MyPet組み込みランダム
#  変更後は /mypetaddon reload で反映してください。
# ============================================================================
# skilltree: MyPetに登録されているスキルツリー名（skilltrees/*.st.json の名前）
# weight: 選出重み（大きいほど選ばれやすい）
#
# 汎用スキルツリー: Combat, Farm, PvP, Ride, Utility, Tank, Assassin, Ranger, Support
# モブ固有スキルツリー: UndeadMight, BoneShot, VenomStrike, NetherFlame, VoidWalker, PackHunter, TidalGuard
# カスタムスキルツリーは plugins/MyPet/skilltrees/ に追加してください
skilltree-assignment:
  # --- デフォルト（特定の指定がない場合） ---
  # テイム時にこのリストから重み付き抽選。進化時は fixed-skilltree で固定。
  default:
    - skilltree: "Combat"
      weight: 20
    - skilltree: "Utility"
      weight: 15
    - skilltree: "Farm"
      weight: 15
    - skilltree: "Ride"
      weight: 10
    - skilltree: "PvP"
      weight: 10
    - skilltree: "Tank"
      weight: 10
    - skilltree: "Assassin"
      weight: 8
    - skilltree: "Ranger"
      weight: 7
    - skilltree: "Support"
      weight: 5

  # --- レアリティ別オーバーライド（上位レアリティに強力なツリーを） ---
  per-rarity:
    MYTHIC:
      - skilltree: "Assassin"
        weight: 30
      - skilltree: "Tank"
        weight: 25
      - skilltree: "Support"
        weight: 25
      - skilltree: "PvP"
        weight: 20
    LEGENDARY:
      - skilltree: "Combat"
        weight: 25
      - skilltree: "Tank"
        weight: 20
      - skilltree: "Assassin"
        weight: 20
      - skilltree: "PvP"
        weight: 15
      - skilltree: "Support"
        weight: 10
      - skilltree: "Ranger"
        weight: 10

  # --- モブタイプ別オーバーライド ---
  # モブ固有ツリーはここで高重みを設定し、汎用ツリーも低重みで混ぜる
  per-mob:
    ZOMBIE:
      - skilltree: "UndeadMight"
        weight: 40
      - skilltree: "Combat"
        weight: 20
      - skilltree: "Tank"
        weight: 20
      - skilltree: "Assassin"
        weight: 10
      - skilltree: "Utility"
        weight: 10
